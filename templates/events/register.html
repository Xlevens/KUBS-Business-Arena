{% extends 'base.html' %}
{% block title %}Register – KUBS Business Arena 2026{% endblock %}

{% block content %}
<div class="card register-card">
  <h2>Contestant Registration</h2>
  <p>Fill in your details to register for KUBS Business Arena 2026.</p>

  <div id="form-message" class="form-message hidden"></div>

  <form id="register-form" novalidate>
    {% csrf_token %}
    <div class="form-group">
      <label for="name">Full Name <span class="required">*</span></label>
      <input type="text" id="name" name="name" placeholder="Enter your full name" required />
    </div>

    <div class="form-group">
      <label for="phone_number">Phone Number <span class="required">*</span></label>
      <input type="tel" id="phone_number" name="phone_number" placeholder="+92 300 1234567" required />
    </div>

    <div class="form-group">
      <label for="roll_number">Roll Number <span class="required">*</span></label>
      <input type="text" id="roll_number" name="roll_number" placeholder="e.g. BSCS-F21-001" required />
    </div>

    <div class="form-group">
      <label for="round">Select Round <span class="required">*</span></label>
      <select id="round" name="round" required>
        <option value="">-- Select a Round --</option>
        {% for rnd in rounds %}
          <option value="{{ rnd.id }}">{{ rnd.event.name }} &rsaquo; {{ rnd.name }}</option>
        {% empty %}
          <option disabled>No rounds available yet.</option>
        {% endfor %}
      </select>
    </div>

    <button type="submit" class="btn btn-primary btn-full">Register Now →</button>
  </form>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
  const form = document.getElementById('register-form');
  const msgBox = document.getElementById('form-message');

  function showMessage(text, type) {
    msgBox.textContent = text;
    msgBox.className = 'form-message ' + type;
    msgBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    msgBox.className = 'form-message hidden';

    const data = {
      name: form.name.value.trim(),
      phone_number: form.phone_number.value.trim(),
      roll_number: form.roll_number.value.trim(),
      round: parseInt(form.round.value),
    };

    if (!data.name || !data.phone_number || !data.roll_number || !data.round) {
      showMessage('Please fill in all required fields.', 'error');
      return;
    }

    try {
      const res = await fetch('/api/register/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value,
        },
        body: JSON.stringify(data),
      });

      const json = await res.json();
      if (res.ok) {
        showMessage('✅ Registration successful! Welcome to KUBS Business Arena 2026.', 'success');
        form.reset();
      } else {
        const errors = Object.entries(json).map(([k, v]) => `${k}: ${Array.isArray(v) ? v.join(', ') : v}`).join('\n');
        showMessage('❌ ' + errors, 'error');
      }
    } catch (err) {
      showMessage('❌ Network error. Please try again.', 'error');
    }
  });
</script>
{% endblock %}
